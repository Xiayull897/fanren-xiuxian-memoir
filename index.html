<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>凡人修仙传 · 角色回忆录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/storage-bag.css">
</head>
<body>
  <div class="cosmic-bg"></div>
  <header class="site-header">
    <h1 class="site-title">凡人修仙传</h1>
    <p class="site-subtitle">角色回忆录</p>
  </header>
  <main id="app">
    <div class="storage-page">
      <div class="filter-bar" id="filter-bar">
        <button class="filter-btn active" data-filter="all">全部</button>
      </div>
      <div class="bag-container floating" id="bag">
        <div class="bag-body"></div>
        <div class="bag-rope"></div>
      </div>
      <p class="bag-hint" id="bag-hint">点击储物袋，查看角色法宝</p>
      <div class="treasures-area" id="treasures"></div>
    </div>
  </main>
  <script src="js/data-loader.js"></script>
  <script src="js/cosmic-scale.js"></script>
  <script src="js/storage-bag.js"></script>
</body>
</html>
